<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <meta name="description"
    content="Moments of Change – Explore the gallery of InAmigos Foundation's impactful work in education, environment, animal welfare, and community development.">
  <meta name="keywords" content="InAmigos Foundation gallery, NGO photos, Bilaspur, community work, volunteer moments">
  <meta name="author" content="InAmigos Foundation">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Gallery – InAmigos Foundation">
  <meta property="og:description"
    content="Moments of Change – See our journey through photos of community impact.">
  <meta property="og:image" content="Assets/og-image.jpg">
  <meta property="og:url" content="https://www.inamigosfoundation.org.in/gallery">
  <meta property="og:type" content="website">
  <title>Gallery • InAmigos Foundation</title>
  <link rel="icon" type="image/png" href="favicon-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    
    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(180deg, #f5f7fb 0%, #f9fcfa 100%);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }

    /* PAGE HEADER */
    .page-header {
      background: linear-gradient(135deg, #0f2a1c 0%, #1a4a2e 50%, #1e8631 100%);
      padding: 80px 20px 70px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .page-header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      position: relative;
    }

    .page-header h1 span {
      background: linear-gradient(90deg, #ff9f1c, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-header .breadcrumb {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      position: relative;
    }

    .page-header .breadcrumb a {
      color: #22c55e;
      text-decoration: none;
    }

    .page-header .breadcrumb a:hover {
      text-decoration: underline;
    }

    /* GALLERY SECTION */
    .gallery-section {
      max-width: 1300px;
      margin: -30px auto 60px;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    .gallery-filter {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 2.5rem;
      background: #fff;
      padding: 15px 25px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    .filter-btn {
      background: #f0f7f2;
      color: #1e2b38;
      border: none;
      padding: 10px 22px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      background: #e0efe5;
    }

    .filter-btn.active {
      background: #1e8631;
      color: #fff;
      box-shadow: 0 4px 15px rgba(30, 134, 49, 0.3);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .gallery-item {
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
      transition: all 0.35s ease;
      position: relative;
      cursor: pointer;
    }

    .gallery-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.08);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.1) 50%, transparent 100%);
      display: flex;
      align-items: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    .overlay-content {
      color: #fff;
    }

    .overlay-content h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .overlay-content p {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .view-more-wrapper {
      text-align: center;
      margin-top: 3rem;
    }

    .load-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      color: #1e8631;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border: 2px solid #1e8631;
      transition: all 0.3s ease;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .load-more-btn:hover {
      background: #1e8631;
      color: #fff;
      box-shadow: 0 8px 25px rgba(30, 134, 49, 0.25);
    }

  </style>
</head>

<body>
  <main id="main-content">
    <section class="page-header">
      <h1>Moments of <span>Change</span></h1>
      <p class="breadcrumb">
        <a href="index.html">Home</a> &nbsp;/&nbsp; Gallery
      </p>
    </section>

    <section class="gallery-section">
      <div class="gallery-filter">
        <button class="filter-btn active" data-filter="all">All</button>
      </div>

      <div class="gallery-grid" id="galleryGrid">
        <!-- Row 1 -->
        <div class="gallery-item" data-category="community">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738054440.jpg" alt="Community outreach event" loading="lazy">
        </div>
        <div class="gallery-item" data-category="education">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738048982.jpg" alt="Education initiative" loading="lazy">
          
        </div>
        <div class="gallery-item" data-category="environment">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738238755.JPG" alt="Tree plantation drive" loading="lazy">
    
        </div>
        <div class="gallery-item" data-category="animal">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1743051382.jpg" alt="Animal welfare activity" loading="lazy">
        </div>
        <!-- Row 2 -->
        <div class="gallery-item" data-category="community">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738299164.jpg" alt="Volunteer gathering" loading="lazy">
          
        </div>
        <div class="gallery-item" data-category="education">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1743051449.jpg" alt="Youth workshop" loading="lazy">
          
        </div>
        <div class="gallery-item" data-category="environment">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738054440.jpg" alt="Cleanliness drive" loading="lazy">
          
        </div>
        <div class="gallery-item" data-category="animal">
          <img src="https://inamigosfoundation.org.in/public/storage/gallery/1738048982.jpg" alt="Animal feeding" loading="lazy">
          
        </div>
      </div>

    </section>
  </main>
</body>

</html>
