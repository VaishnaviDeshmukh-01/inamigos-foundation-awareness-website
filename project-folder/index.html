<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>InAmigos Foundation • Responsive Navbar</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar">

    <!-- LOGO -->
    <a href="#" class="logo-link" aria-label="InAmigos Foundation home">
      <img src="horizontal-logo.png" alt="InAmigos Foundation Logo" class="logo-img" />
    </a>

    <!-- DESKTOP NAV (visible on desktop) -->
    <div class="desktop-nav-wrapper">
      <ul class="nav-links">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Our Initiatives</a></li>
        <li><a href="#">Impact</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Get Involved</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
      <a href="#" class="btn-donate">
        <i class="fas fa-heart"></i> Donate Now
      </a>
    </div>

    <!-- HAMBURGER MENU BUTTON (visible on mobile/tablet) -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <i class="fas fa-bars"></i>
    </button>

    <!-- MOBILE MENU CONTAINER (hidden by default) -->
    <div class="mobile-menu-container" id="mobileMenu">
      <ul class="nav-links" id="mobileNavLinks">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Our Initiatives</a></li>
        <li><a href="#">Impact</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Get Involved</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
      <div class="mobile-donate-wrapper">
        <a href="#" class="btn-donate">
          <i class="fas fa-heart"></i> Donate Now
        </a>
      </div>
    </div>

  </nav>

  <!-- <script src="script.js"></script> -->

</body>

</html>
